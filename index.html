<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tung Design v2.7.2 - Professional Spec Engine</title>
    
    <!-- 改用 jsDelivr CDN（更穩定，香港速度快） -->
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.js"></script>
    
    <!-- React & React DOM - 固定版本避免不穩定 -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    
    <!-- Babel standalone - 固定版本 -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"></script>
    
    <!-- Lucide Icons - 固定版本 -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.1/dist/umd/lucide.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="range"] { height: 6px; -webkit-appearance: none; background: #e2e8f0; border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #10b981; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body class="bg-[#F1F5F9]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 封裝 Lucide Icon 組件
        const Icon = ({ name, size = 20, className = "" }) => {
            const LucideIcon = lucide[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('path1');
            const [viewMode, setViewMode] = useState('clean');
            const [isGenerating, setIsGenerating] = useState(false);
            const [currentStep, setCurrentStep] = useState('idle');
            const [showSpecModal, setShowSpecModal] = useState(false);
            const [colorCount, setColorCount] = useState(4);
            const [showCustomModule, setShowCustomModule] = useState(false);
            const [customModuleName, setCustomModuleName] = useState('');
            const [generatedResult, setGeneratedResult] = useState(null);

            // 模組數據結構
            const [modules, setModules] = useState({
                badge: { isCustom: false, name: '徽章/背章', types: ['平繡', '立體繡', '織嘜', '軟琺瑯', '硬琺瑯', '印刷滴膠'], shapes: ['圓形', '橢圓', '盾形', '正方形', '五角形', '異形'] },
                woggle: { isCustom: false, name: '巾圈', types: ['皮革雷雕', '鋅合金鑄造', '皮革烙印', '木質噴繪', 'PVC 軟膠'], shapes: ['圓柱環型', '皮革平鋪式', '五邊形柱狀', '不規則 3D'] },
                souvenir: { isCustom: false, name: '紀念品', types: ['雙面鑄造', '噴砂', '拉絲', '仿古電鍍'], shapes: ['挑戰幣', '鑰匙扣', '紀念章', '領帶夾'] }
            });

            const initialColors = ['#2D5A27', '#5D4037', '#FF9800', '#FFFFFF', '#000000', '#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#00FFFF', '#FF00FF', '#C0C0C0', '#808080', '#800000', '#008000'];

            const [formData, setFormData] = useState({
                path1: { activity: '', nature: '', idea: '', chineseText: '', englishText: '', designStyle: '' },
                path2: { colors: initialColors },
                path3: { refDesc: '', refUrl: '', fileName: '', hasRef: false },
                path4: { module: 'badge', type: '硬琺瑯', shape: '圓形', customType: '', customShape: '' },
                path5: { adjustment: '', craftAdjustment: '' }
            });

            // 隨機色彩功能
            const handleRandomColors = () => {
                const randomHex = () => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0').toUpperCase();
                const newColors = Array.from({ length: 16 }, randomHex);
                setFormData(prev => ({ ...prev, path2: { ...prev.path2, colors: newColors } }));
            };

            // 生成按鈕 - 靜態測試版，直接呼叫 Gemini API（請貼上你的 Key）
            const handleGenerate = async () => {
                if (!formData.path1.idea) {
                    alert('請先輸入設計理念！');
                    return;
                }

                setIsGenerating(true);
                setCurrentStep('generating');

                try {
                    // ★★★ 這裡貼上你的 Gemini API Key（測試用，之後請移除！） ★★★
                    const API_KEY = '你的_GEMINI_API_KEY_貼這裡';  // ←←← 替換成你的真實 Key

                    const prompt = `
極端硬邊緣風格，純色塊、無漸層、無抗鋸齒、4px一致線寬、aliased edges、cel-shading 硬邊陰影、flat stacking、高對比、生產就緒徽章設計，
模組：${modules[formData.path4.module].name}，
工藝：${formData.path4.type || formData.path4.customType || '織繡'}，
形狀：${formData.path4.shape || formData.path4.customShape || '圓形'}，
核心理念：${formData.path1.idea}，
活動名稱：${formData.path1.activity || '未命名'}，
中文文字：${formData.path1.chineseText || '無'}，
英文文字：${formData.path1.englishText || '無'}，
設計風格：${formData.path1.designStyle || '預設'}，
顏色限定（只使用這些純色）：${formData.path2.colors.slice(0, colorCount).join(', ')}，
微調指令：${formData.path5.adjustment || '無'}
                    `;

                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
                            })
                        }
                    );

                    if (!response.ok) {
                        throw new Error(`API 錯誤：${response.status}`);
                    }

                    const data = await response.json();
                    const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text || '生成失敗，請檢查 API Key';

                    setGeneratedResult({ text: generatedText, promptUsed: prompt });
                    setCurrentStep('generated');

                } catch (err) {
                    console.error(err);
                    alert('生成失敗：' + err.message + '\n\n請檢查：1. API Key 是否正確 2. 網路連線');
                } finally {
                    setIsGenerating(false);
                }
            };

            // 下載規格書（維持原功能）
            const handleDownloadHTML = () => {
                // ... 你的原代碼保持不變 ...
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* 你的 header、main、控制面板、預覽面板全部維持原樣 */}
                    {/* 只在預覽區加顯示生成結果的部分 */}
                    <div className="lg:col-span-7 space-y-4">
                        <div className="bg-slate-900 rounded-[2.5rem] shadow-2xl border-[6px] border-white overflow-hidden relative min-h-[550px] flex flex-col">
                            {/* ... 原有 header 與 tab 按鈕 ... */}

                            <div className="flex-1 flex flex-col items-center justify-center p-8 text-center relative">
                                {currentStep === 'idle' ? (
                                    <div className="opacity-20 flex flex-col items-center">
                                        <Icon name="Globe" size={60} className="text-white mb-4 animate-pulse" />
                                        <p className="text-white text-[10px] font-black uppercase tracking-[0.4em]">Engine Standby...</p>
                                    </div>
                                ) : currentStep === 'generating' ? (
                                    <div className="flex flex-col items-center">
                                        <Icon name="Loader2" size={60} className="animate-spin text-emerald-500 mb-4" />
                                        <p className="text-white text-lg">AI 生成中...</p>
                                    </div>
                                ) : currentStep === 'generated' && generatedResult ? (
                                    <div className="w-full h-full flex flex-col items-center justify-center animate-in fade-in">
                                        <div className="bg-slate-800 p-6 rounded-2xl max-w-lg w-full text-white">
                                            <h3 className="text-xl font-black mb-4">生成結果</h3>
                                            <p className="whitespace-pre-wrap text-sm">{generatedResult.text}</p>
                                            <p className="mt-4 text-xs text-slate-400">使用的 Prompt（部分）：{generatedResult.promptUsed.substring(0, 100)}...</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="animate-in zoom-in-95 duration-500">
                                        {/* 原有 placeholder 內容 */}
                                        <div className={`w-64 h-64 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(0,0,0,0.5)] mx-auto transition-all duration-700 ${viewMode === 'clean' ? 'bg-emerald-500' : 'bg-blue-600 rotate-12'}`}>
                                            <Icon name="Shield" size={120} className="text-white drop-shadow-2xl" />
                                        </div>
                                        <h3 className="text-white mt-10 text-4xl font-black italic uppercase drop-shadow-md tracking-tight">{formData.path1.activity || 'New Design'}</h3>
                                        {/* ... 其他描述 ... */}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 你的其他部分：規格書彈窗、下載按鈕等保持原樣 */}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
