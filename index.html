<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tung Design v2.7.2 - 私人測試版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-font-smoothing: antialiased; }
        .shimmer {
            background: linear-gradient(90deg, #10b981 0%, #34d399 50%, #10b981 100%);
            background-size: 200% auto;
            animation: shimmer 2s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
        .loading-ring {
            border: 3px solid rgba(16, 185, 129, 0.2);
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root">
        <div style="display: flex; height: 100vh; width: 100%; align-items: center; justify-content: center;">
            <div style="text-align: center;">
                <div class="loading-ring" style="margin: 0 auto 16px;"></div>
                <p style="font-size: 12px; color: #94a3b8; font-weight: bold; letter-spacing: 0.2em;">PRIVATE ENGINE LOADING...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /**
         * ⚠️ 重要：已填入您的 Gemini API KEY
         * 此檔案內含私密金鑰，請務必妥善保管
         */
        const API_KEY = "AIzaSyBxqxDVgHsObWcnOqJoJ2m1tEzJuFauRyA"; 

        const Icon = ({ name, size = 20, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                if (window.lucide && window.lucide.icons) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        const svgString = icon.toSvg({ width: size, height: size, class: className, 'stroke-width': 2 });
                        setSvg(svgString);
                    }
                }
            }, [name, size, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('path1');
            const [isGenerating, setIsGenerating] = useState(false);
            const [generatedImage, setGeneratedImage] = useState(null);
            const [errorMessage, setErrorMessage] = useState("");
            const [showSpecModal, setShowSpecModal] = useState(false);

            const [formData, setFormData] = useState({
                activity: '',
                designStyle: '現代簡約向量插畫',
                idea: '',
                module: 'badge',
                type: '硬琺瑯',
                colors: ['#1e293b', '#10b981', '#f59e0b', '#ffffff']
            });

            // 指數退避請求函數 (Exponential Backoff)
            const fetchWithRetry = async (url, options, retries = 5) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (response.ok) return await response.json();
                        if (response.status === 429) {
                            const delay = Math.pow(2, i) * 1000;
                            await new Promise(r => setTimeout(r, delay));
                            continue;
                        }
                        const errData = await response.json();
                        throw new Error(errData.error?.message || `HTTP ${response.status}`);
                    } catch (err) {
                        if (i === retries - 1) throw err;
                    }
                }
            };

            const generateDesign = async () => {
                if (!API_KEY) {
                    setErrorMessage("未檢測到 API Key。");
                    return;
                }

                setIsGenerating(true);
                setErrorMessage("");
                
                try {
                    // 1. 生成優化後的提示詞 (Gemini 2.5 Flash)
                    const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`;
                    const promptResponse = await fetchWithRetry(geminiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `你是一位資深產品設計師。用戶想設計一個${formData.module}，活動是"${formData.activity}"，風格是${formData.designStyle}，核心元素包含：${formData.idea}。請為我生成一段細緻的英文繪圖提示詞 (Prompt)，背景必須純白，向量風格，方便後續生產。直接回傳提示詞即可。` }] }]
                        })
                    });

                    const refinedPrompt = promptResponse.candidates?.[0]?.content?.parts?.[0]?.text || formData.idea;

                    // 2. 呼叫 Imagen 4.0 生成圖片
                    const imagenUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${API_KEY}`;
                    const imageResponse = await fetchWithRetry(imagenUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            instances: { prompt: refinedPrompt },
                            parameters: { sampleCount: 1 }
                        })
                    });

                    if (imageResponse.predictions?.[0]?.bytesBase64Encoded) {
                        setGeneratedImage(`data:image/png;base64,${imageResponse.predictions[0].bytesBase64Encoded}`);
                    } else {
                        throw new Error("Imagen 引擎繁忙或未回傳圖像，請稍後重試。");
                    }

                } catch (error) {
                    console.error(error);
                    setErrorMessage(`錯誤：${error.message}`);
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-slate-900 text-white px-6 py-4 sticky top-0 z-50 flex justify-between items-center shadow-xl border-b border-emerald-500/30">
                        <div className="flex items-center gap-3">
                            <div className="bg-emerald-500 p-2 rounded-xl shimmer shadow-lg shadow-emerald-500/20">
                                <Icon name="Zap" className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-lg font-black italic uppercase tracking-tighter">Tung Private</h1>
                                <p className="text-[8px] text-emerald-400 font-bold tracking-[0.4em]">INTERNAL SECURE v2.7.2</p>
                            </div>
                        </div>
                        {errorMessage && (
                            <div className="bg-red-500/20 text-red-400 text-[10px] px-4 py-2 rounded-full border border-red-500/30 animate-pulse">
                                {errorMessage}
                            </div>
                        )}
                    </header>

                    <main className="max-w-7xl mx-auto p-6 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <div className="lg:col-span-5 space-y-6">
                            <div className="glass-panel rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                                <div className="flex bg-slate-50 p-2 border-b">
                                    {['內容設定', '顏色', '載體'].map((label, idx) => (
                                        <button 
                                            key={idx}
                                            onClick={() => setActiveTab(`path${idx+1}`)}
                                            className={`flex-1 py-3 rounded-2xl text-xs font-black transition-all ${activeTab === `path${idx+1}` ? 'bg-white shadow-md text-emerald-600' : 'text-slate-400'}`}
                                        >
                                            {label}
                                        </button>
                                    ))}
                                </div>
                                
                                <div className="p-8 min-h-[350px]">
                                    {activeTab === 'path1' && (
                                        <div className="space-y-4 animate-in fade-in slide-in-from-bottom-2">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">活動名稱</label>
                                                <input className="w-full p-4 bg-slate-50 rounded-2xl text-sm border-2 border-transparent focus:border-emerald-500/20 outline-none" value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} placeholder="例如：第15屆童軍大露營" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">理念描述</label>
                                                <textarea className="w-full p-4 bg-slate-50 rounded-2xl text-sm h-32 border-2 border-transparent focus:border-emerald-500/20 outline-none resize-none" value={formData.idea} onChange={e => setFormData({...formData, idea: e.target.value})} placeholder="描述想要出現的元素（如：營火、百合花、山脈...）" />
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'path2' && (
                                        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-2">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">調色盤設定</p>
                                            <div className="grid grid-cols-4 gap-4">
                                                {formData.colors.map((c, i) => (
                                                    <input key={i} type="color" value={c} onChange={e => {
                                                        const newCols = [...formData.colors];
                                                        newCols[i] = e.target.value;
                                                        setFormData({...formData, colors: newCols});
                                                    }} className="w-full h-12 rounded-xl cursor-pointer hover:scale-105 transition-transform" />
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'path3' && (
                                        <div className="grid grid-cols-2 gap-4 animate-in fade-in slide-in-from-bottom-2">
                                            {['badge', 'woggle', 'souvenir'].map(m => (
                                                <button key={m} onClick={() => setFormData({...formData, module: m})} className={`p-6 rounded-3xl border-2 transition-all flex flex-col items-center gap-3 ${formData.module === m ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-slate-50 text-slate-300'}`}>
                                                    <Icon name={m === 'badge' ? 'Shield' : m === 'woggle' ? 'Infinity' : 'Award'} size={24} />
                                                    <span className="text-[10px] font-black uppercase tracking-widest">{m === 'badge' ? '徽章' : m === 'woggle' ? '巾圈' : '紀念品'}</span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            <button 
                                onClick={generateDesign} 
                                disabled={isGenerating || !formData.idea}
                                className="w-full py-6 bg-slate-900 text-white rounded-[2rem] font-black text-lg shadow-2xl hover:bg-black active:scale-[0.98] transition-all flex items-center justify-center gap-4 disabled:opacity-40"
                            >
                                {isGenerating ? <div className="loading-ring"></div> : <Icon name="Sparkles" />}
                                {isGenerating ? '正在繪製設計圖...' : '立即生成測試'}
                            </button>
                        </div>

                        <div className="lg:col-span-7">
                            <div className="bg-slate-900 rounded-[3rem] border-[10px] border-white shadow-2xl min-h-[600px] flex flex-col relative overflow-hidden group">
                                <div className="flex-1 flex items-center justify-center p-12">
                                    {isGenerating ? (
                                        <div className="text-center space-y-4">
                                            <div className="loading-ring border-t-emerald-400 w-12 h-12 mx-auto"></div>
                                            <p className="text-emerald-400 text-xs font-black uppercase tracking-widest animate-pulse">Processing AI Vision</p>
                                        </div>
                                    ) : generatedImage ? (
                                        <div className="animate-in zoom-in-95 duration-500 bg-white p-4 rounded-3xl shadow-2xl">
                                            <img src={generatedImage} className="max-w-full max-h-[400px] rounded-xl" alt="AI Generated Result" />
                                        </div>
                                    ) : (
                                        <div className="text-center opacity-20">
                                            <Icon name="Shapes" size={100} className="text-white mx-auto mb-6" />
                                            <p className="text-white text-xs font-black uppercase tracking-[0.4em]">測試預覽區</p>
                                        </div>
                                    )}
                                </div>

                                {generatedImage && (
                                    <div className="p-8 bg-white/5 border-t border-white/10 flex justify-between items-center">
                                        <div className="space-y-1">
                                            <h3 className="text-white text-xl font-black italic uppercase">{formData.activity || 'Test Project'}</h3>
                                            <p className="text-[8px] text-emerald-400 font-bold uppercase tracking-widest">Imagen 4.0 Stable Output</p>
                                        </div>
                                        <button onClick={() => setShowSpecModal(true)} className="px-6 py-3 bg-emerald-500 text-white rounded-xl font-black text-[10px] uppercase shadow-lg shadow-emerald-500/20 hover:bg-emerald-400 transition-all">
                                            查看生產規格
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {showSpecModal && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-lg p-10 relative animate-in zoom-in-95 duration-300">
                                <button onClick={() => setShowSpecModal(false)} className="absolute top-8 right-8 p-2 hover:bg-slate-100 rounded-full transition-colors">
                                    <Icon name="X" />
                                </button>
                                <h2 className="text-2xl font-black italic uppercase mb-8">Specification Card</h2>
                                <div className="space-y-6 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                    <div className="grid grid-cols-2 gap-6">
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase block mb-1">載體模組</label>
                                            <p className="font-bold text-slate-900 text-sm">{formData.module}</p>
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase block mb-1">生產工藝</label>
                                            <p className="font-bold text-emerald-600 text-sm">{formData.type}</p>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-slate-400 uppercase block mb-2">色標分配</label>
                                        <div className="flex gap-2">
                                            {formData.colors.map((c, i) => (
                                                <div key={i} className="w-8 h-8 rounded-lg shadow-inner" style={{backgroundColor: c}}></div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
