<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>童創工坊 - 香港童軍免費紀念品設計</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body {
      font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #fdfcf7, #e8f0e8);
      min-height: 100vh;
      color: #2D4B3E;
    }
    .card {
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 10px 30px rgba(45,75,62,0.15);
    }
    .btn {
      background: #2D4B3E;
      color: white;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #1a2f24;
      transform: translateY(-2px);
    }
    .status {
      min-height: 1.5rem;
    }
  </style>
</head>
<body class="p-6 md:p-10">
  <div class="max-w-4xl mx-auto">
    <!-- 標題 -->
    <div class="text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-black italic text-[#2D4B3E]">童創工坊</h1>
      <p class="text-lg text-[#8B9D83] mt-2">香港童軍免費 AI 紀念品設計工具</p>
    </div>

    <!-- 輸入表單 -->
    <div class="card p-6 md:p-10">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-bold mb-2">專案 / 活動名稱</label>
          <input id="projectName" type="text" class="w-full p-4 border rounded-xl focus:outline-none focus:border-[#2D4B3E]" placeholder="例如：2026 大會操紀念章" />
        </div>

        <div>
          <label class="block text-sm font-bold mb-2">類型</label>
          <select id="category" class="w-full p-4 border rounded-xl focus:outline-none focus:border-[#2D4B3E]">
            <option value="badge">徽章 / 紀念章</option>
            <option value="woggle">巾圈</option>
            <option value="souvenir">其他紀念品</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-bold mb-2">中文文字</label>
          <input id="chineseText" type="text" class="w-full p-4 border rounded-xl focus:outline-none focus:border-[#2D4B3E]" placeholder="例如：筲箕灣區 2026 大會操" />
        </div>

        <div>
          <label class="block text-sm font-bold mb-2">英文文字</label>
          <input id="englishText" type="text" class="w-full p-4 border rounded-xl focus:outline-none focus:border-[#2D4B3E]" placeholder="例如：Shau Kei Wan District Jamboree 2026" />
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-bold mb-2">核心概念 / 活動主題</label>
          <textarea id="coreConcept" rows="3" class="w-full p-4 border rounded-xl focus:outline-none focus:border-[#2D4B3E]" placeholder="例如：露營團結、遠足冒險、服務社群..."></textarea>
        </div>
      </div>

      <!-- 生成按鈕 -->
      <button onclick="generateDesign()" class="mt-8 w-full py-6 btn rounded-2xl font-black text-xl shadow-lg flex items-center justify-center gap-3" id="btn">
        <i class="fas fa-magic"></i> 啟動生成（免費 Perchance AI）
      </button>

      <p id="status" class="status text-center mt-4 text-[#8B9D83] font-medium">準備好了！輸入完成後點上方按鈕</p>
    </div>

    <!-- 說明 -->
    <p class="text-center text-sm text-[#8B9D83] mt-6">
      生成後在 Perchance 網站點「Download」下載圖片 · 完全免費、無限次、無需登入
    </p>
  </div>

  <script>
    function generateDesign() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = '正在開啟生成器...';

      const projectName = document.getElementById('projectName').value.trim() || '童軍紀念專案';
      const category = document.getElementById('category').value;
      const chineseText = document.getElementById('chineseText').value.trim() || '香港童軍';
      const englishText = document.getElementById('englishText').value.trim() || 'HONG KONG SCOUT';
      const coreConcept = document.getElementById('coreConcept').value.trim() || '童軍活動主題';

      const prompt = `香港童軍專屬${category === 'badge' ? '紀念章' : category === 'woggle' ? '巾圈' : '紀念禮品'}設計，項目名稱：${projectName}，核心概念：${coreConcept}，中文文字："${chineseText}"，英文文字："${englishText}"，綠金色調主導，童軍百合花徽章元素，乾淨簡約卡通風格，高對比清晰，適合刺繡/織章/熱轉印，圓形或盾形邊框，專業產品攝影風格，白底，高解析度，無水印`;

      const url = `https://perchance.org/ai-text-to-image-generator?prompt=${encodeURIComponent(prompt)}`;
      window.open(url, '_blank');

      setTimeout(() => {
        btn.disabled = false;
        status.textContent = '已開啟！請點「Generate」生成圖片';
      }, 1500);
    }
  </script>
</body>
</html>
